    <section class="auth-section">
      <div class="container">
        <div class="section-header">
          <h2>Login</h2>
          <p>Sign in to access your sessions.</p>
        </div>

        <div class="auth-card">
          <div class="auth-error" id="loginError"></div>
          <form class="auth-form" id="loginForm">
            <input
              class="auth-input"
              type="email"
              id="emailInput"
              placeholder="Email"
              autocomplete="email"
              required
            />
            <input
              class="auth-input"
              type="password"
              id="passwordInput"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
            <button class="btn-primary" type="submit">Login</button>
          </form>
        </div>
      </div>
    </section>

    <script type="module" src="script.js"></script>
    <script>
      (() => {
        const els = {
          form: document.getElementById("loginForm"),
          email: document.getElementById("emailInput"),
          password: document.getElementById("passwordInput"),
          error: document.getElementById("loginError"),
        };

        function showError(msg) {
          els.error.textContent = msg;
          els.error.style.display = "block";
        }

        function clearError() {
          els.error.textContent = "";
          els.error.style.display = "none";
        }

        if (window.location.protocol === "file:") {
          showError(
            "لازم تفتح الموقع من السيرفر: http://localhost:3000/login.html (مش من ملف مباشر).",
          );
        }

        function routeByRole(user) {
          if (!user) return "index.html";
          if (user.pwdNeedsReset) return "set-password.html";
          if (user.role === "administrator") return "manage.html";
          if (user.role === "recorded_student") return "recorded.html";
          return "live.html";
        }

        window.addEventListener("auth:ready", (e) => {
          const user = e.detail?.user;
          if (user) window.location.href = routeByRole(user);
        });

        els.form.addEventListener("submit", async (e) => {
          e.preventDefault();
          clearError();
          const email = els.email.value.trim();
          const password = els.password.value;

          try {
            const res = await window.MarvelsPlatform.apiFetch(
              "/api/auth/login",
              {
                method: "POST",
                body: JSON.stringify({ email, password }),
              },
            );
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
              showError("Invalid email or password.");
              return;
            }
            if (data.token) window.MarvelsPlatform.setToken(data.token);
            if (data.mustResetPassword) {
              window.location.href = "set-password.html";
              return;
            }
            window.location.href = routeByRole(data.user);
          } catch {
            showError(
              "فشل الاتصال بالسيرفر. تأكد إن السيرفر شغال وافتح الصفحة من http://localhost:3000/ .",
            );
          }
        });
      })();
    </script>
  </body>
