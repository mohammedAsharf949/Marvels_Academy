<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password - Marvels Maths Academy</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <header class="header">
      <nav class="navbar">
        <div class="nav-container">
          <div class="nav-logo">
            <img
              src="./site/White_Black_Monogram_M_Business_Logo___1000_x_500_px_-removebg-preview.png"
              alt="Logo"
              class="mz-logo"
            />
          </div>
          <ul class="nav-menu">
            <li class="nav-item">
              <a href="index.html" class="nav-link">Home</a>
            </li>
            <li class="nav-item">
              <a href="live.html" class="nav-link">Live Sessions</a>
            </li>
            <li class="nav-item">
              <a href="recorded.html" class="nav-link" data-nav="recorded"
                >Recorded Sessions</a
              >
            </li>
            <li class="nav-item">
              <a href="manage.html" class="nav-link" data-nav="manage"
                >Manage Panel</a
              >
            </li>
            <li class="nav-item">
              <a href="games.html" class="nav-link">Games</a>
            </li>
            <li class="nav-item">
              <a href="login.html" class="nav-link" data-nav="auth">Login</a>
            </li>
          </ul>
          <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
        </div>
      </nav>
    </header>

    <section class="auth-section">
      <div class="container">
        <div class="section-header">
          <h2>Set New Password</h2>
          <p>Choose a new password. It will be saved securely.</p>
        </div>

        <div class="auth-card">
          <div class="auth-error" id="setPassError"></div>
          <form class="auth-form" id="setPassForm">
            <input
              class="auth-input"
              type="password"
              id="newPasswordInput"
              placeholder="New password"
              autocomplete="new-password"
              required
            />
            <input
              class="auth-input"
              type="password"
              id="confirmPasswordInput"
              placeholder="Confirm new password"
              autocomplete="new-password"
              required
            />
            <button class="btn-primary" type="submit">Save Password</button>
          </form>
        </div>
      </div>
    </section>

    <script type="module" src="script.js"></script>
    <script>
      (() => {
        const els = {
          form: document.getElementById("setPassForm"),
          newPassword: document.getElementById("newPasswordInput"),
          confirmPassword: document.getElementById("confirmPasswordInput"),
          error: document.getElementById("setPassError"),
        };

        function showError(msg) {
          els.error.textContent = msg;
          els.error.style.display = "block";
        }

        function clearError() {
          els.error.textContent = "";
          els.error.style.display = "none";
        }

        function routeByRole(user) {
          if (!user) return "index.html";
          if (user.role === "administrator") return "manage.html";
          if (user.role === "recorded_student") return "recorded.html";
          return "live.html";
        }

        window.addEventListener("auth:ready", (e) => {
          const user = e.detail?.user;
          if (!user) window.location.href = "login.html";
        });

        els.form.addEventListener("submit", async (e) => {
          e.preventDefault();
          clearError();
          const p1 = els.newPassword.value;
          const p2 = els.confirmPassword.value;

          if (p1.length < 6) {
            showError("Password must be at least 6 characters.");
            return;
          }
          if (p1 !== p2) {
            showError("Passwords do not match.");
            return;
          }

          const res = await window.MarvelsPlatform.apiFetch(
            "/api/auth/set-password",
            {
              method: "POST",
              body: JSON.stringify({ newPassword: p1 }),
            },
          );
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showError("Failed to save password. Please try again.");
            return;
          }
          if (data.token) window.MarvelsPlatform.setToken(data.token);
          window.location.href = routeByRole(data.user);
        });
      })();
    </script>
  </body>
</html>
